name: Feature request
description: Something TierDB should do
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What you are trying to do and what gets in the way today.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What you would like to happen. Sketch the SQL or workflow if it helps.
    validations:
      required: false
