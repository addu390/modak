name: Bug report
description: Something broke or behaved wrong
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you did, what you expected, and what you got instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Smallest sequence that triggers it. SQL statements, CLI commands, or console steps.
      render: shell
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Postgres version, table mode (tiered or mirrored), how you run the worker, whether the images were pulled from GHCR (which tag) or built from source (which commit), and relevant logs.
    validations:
      required: false
