name: docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/modak-labs

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { runner: ubuntu-24.04, platform: linux/amd64 }
          - { runner: ubuntu-24.04-arm, platform: linux/arm64 }
        image:
          - { name: tierdb, dockerfile: docker/Dockerfile.postgres, target: runtime }
          - { name: tierdb-embedded, dockerfile: docker/Dockerfile.postgres, target: embedded }
          - { name: tierdb-worker, dockerfile: docker/Dockerfile.worker, target: "" }
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          platforms: ${{ matrix.arch.platform }}
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.arch.platform }}
          cache-to: type=gha,scope=${{ matrix.image.name }}-${{ matrix.arch.platform }},mode=max
          outputs: type=image,name=${{ env.REGISTRY }}/${{ matrix.image.name }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.image.name }}-${{ matrix.arch.runner }}
          path: /tmp/digests/*
          if-no-files-found: error

  merge:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [tierdb, tierdb-embedded, tierdb-worker]
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: digests-${{ matrix.image }}-*
          path: /tmp/digests
          merge-multiple: true

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ matrix.image }}@sha256:%s ' *)
          docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}"
