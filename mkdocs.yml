site_name: tierdb
site_description: >-
  Fast, transparent and cost-effective data tiering between Postgres and
  Apache Iceberg.
site_url: https://tierdb-labs.github.io/tierdb/
repo_url: https://github.com/Modak-Labs/tierdb
repo_name: Modak-Labs/tierdb

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: octicons/sun-24
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: octicons/moon-24
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.footer
    - navigation.top
    - content.code.copy
    - search.suggest
    - toc.follow

extra_css:
  - assets/css/extra.css

extra_javascript:
  - assets/js/nav.js

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: false
  - pymdownx.inlinehilite
  - pymdownx.details

nav:
  - Home: index.md
  - Getting started:
      - Quickstart: getting-started/quickstart.md
      - Installation: getting-started/installation.md
      - Concepts: getting-started/concepts.md
      - Architecture: getting-started/architecture.md
  - Modes:
      - Choosing a mode: modes/choosing.md
      - The contract: modes/contract.md
  - Working with tables:
      - Registering tables: tables/registering-tables.md
      - Storage profiles: tables/storage-profiles.md
      - Reading: tables/reading.md
      - Corrections & schema changes: tables/corrections.md
  - Ingestion:
      - Bulk ingestion: ingestion/bulk-ingestion.md
      - Stream load: ingestion/stream-load.md
  - Integrations:
      - Overview: integrations/index.md
      - Spark: integrations/spark.md
      - Trino: integrations/trino.md
  - Operations:
      - Deployment modes: operations/deployment.md
      - Production deployment: operations/production.md
      - Deploying on AWS: operations/aws.md
      - Day-2 operations: operations/day-2.md
      - Lake maintenance: operations/lake-maintenance.md
      - Console: operations/console.md
  - Reference:
      - SQL API: reference/sql.md
      - CLI: reference/cli.md
      - Configuration: reference/configuration.md
      - Catalog schema: reference/catalog.md
      - Seam protocol: reference/seam.md
      - Metrics: reference/metrics.md
