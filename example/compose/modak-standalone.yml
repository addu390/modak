services:
  postgres:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.postgres
      target: runtime
    environment:
      POSTGRES_PASSWORD: modak
      MODAK_S3_ENDPOINT: s3.amazonaws.com
      MODAK_S3_ACCESS_KEY: your-access-key
      MODAK_S3_SECRET_KEY: your-secret-key
      MODAK_S3_USE_SSL: "true"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 30

  worker:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MODAK_PG_URL: jdbc:postgresql://postgres:5432/postgres
      MODAK_PG_USER: postgres
      MODAK_PG_PASSWORD: modak
      MODAK_WAREHOUSE: s3://warehouse
      MODAK_S3_ENDPOINT: https://s3.amazonaws.com
      MODAK_S3_ACCESS_KEY: your-access-key
      MODAK_S3_SECRET_KEY: your-secret-key
      MODAK_S3_SSL: "true"
      MODAK_CYCLE_INTERVAL_SECONDS: "5"
      MODAK_TIERING_LAG: "0"
      MODAK_CONSOLE_PORT: "9090"
      MODAK_LOAD_TOKEN: "modak-example"
    ports:
      - "9090:9090"
    restart: unless-stopped

volumes:
  pgdata:
