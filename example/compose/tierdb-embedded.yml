services:
  postgres:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.postgres
      target: embedded
    command:
      - "-c"
      - "tierdb.embedded_worker=on"
      - "-c"
      - "tierdb.worker_env=TIERDB_S3_ENDPOINT=https://s3.amazonaws.com;TIERDB_CYCLE_INTERVAL_SECONDS=5;TIERDB_TIERING_LAG=0;TIERDB_CONSOLE_PORT=9090;TIERDB_LOAD_TOKEN=tierdb-example"
    environment:
      TIERDB_PG_USER: postgres
      TIERDB_PG_PASSWORD: tierdb
      TIERDB_WAREHOUSE: s3://warehouse
      TIERDB_S3_ENDPOINT: s3.amazonaws.com
      TIERDB_S3_ACCESS_KEY: your-access-key
      TIERDB_S3_SECRET_KEY: your-secret-key
      TIERDB_S3_USE_SSL: "true"
    ports:
      - "9090:9090"

  worker:
    profiles: ["cli"]
    restart: "no"
