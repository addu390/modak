# Services pull the published images; compose falls back to building from
# source when a pull fails. `make patch` forces a local rebuild.
services:
  postgres:
    image: ghcr.io/modak-labs/tierdb:latest
    build:
      context: ../..
      dockerfile: docker/Dockerfile.postgres
      target: runtime
    environment:
      POSTGRES_PASSWORD: tierdb
      TIERDB_S3_ENDPOINT: s3.amazonaws.com
      TIERDB_S3_ACCESS_KEY: your-access-key
      TIERDB_S3_SECRET_KEY: your-secret-key
      TIERDB_S3_USE_SSL: "true"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 30

  worker:
    image: ghcr.io/modak-labs/tierdb-worker:latest
    build:
      context: ../..
      dockerfile: docker/Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TIERDB_PG_URL: jdbc:postgresql://postgres:5432/postgres
      TIERDB_PG_USER: postgres
      TIERDB_PG_PASSWORD: tierdb
      TIERDB_WAREHOUSE: s3://warehouse
      TIERDB_S3_ENDPOINT: https://s3.amazonaws.com
      TIERDB_S3_ACCESS_KEY: your-access-key
      TIERDB_S3_SECRET_KEY: your-secret-key
      TIERDB_S3_SSL: "true"
      TIERDB_CYCLE_INTERVAL_SECONDS: "5"
      TIERDB_TIERING_LAG: "0"
      TIERDB_CONSOLE_PORT: "9090"
      TIERDB_LOAD_TOKEN: "tierdb-example"
    ports:
      - "9090:9090"
    restart: unless-stopped

volumes:
  pgdata:
