services:
  spark:
    build:
      context: ../..
      dockerfile: example/compose/spark/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
      lakekeeper-warehouse:
        condition: service_completed_successfully
    environment:
      TIERDB_PG_URL: jdbc:postgresql://postgres:5432/postgres
      TIERDB_PG_USER: postgres
      TIERDB_PG_PASSWORD: tierdb
      TIERDB_S3_ENDPOINT: rustfs:9000
      TIERDB_S3_ACCESS_KEY: rustfs-root-user
      TIERDB_S3_SECRET_KEY: rustfs-root-password
      TIERDB_CATALOG_URI: http://lakekeeper:8181/catalog
      TIERDB_CATALOG_WAREHOUSE: tierdb
      TIERDB_TABLE: public.trip_events
    profiles: ["cli"]
    restart: "no"
