services:
  trino:
    build:
      context: ../..
      dockerfile: example/compose/trino/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "trino", "--execute", "SELECT 1"]
      interval: 5s
      timeout: 10s
      retries: 30
